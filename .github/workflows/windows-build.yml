name: Build Windows screenpipe Binary

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout your workflow repo
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      # 2. Clone the screenpipe repo
      - name: Clone screenpipe repo
        run: git clone https://github.com/mediar-ai/screenpipe.git

      # 3. Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 4. Install vcpkg manually (simpler, avoids lukka issues)
      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/Microsoft/vcpkg.git ${{ runner.workspace }}/vcpkg
          cd ${{ runner.workspace }}/vcpkg
          .\\bootstrap-vcpkg.bat
          .\\vcpkg integrate install

      # 5. Install OpenBLAS via vcpkg
      - name: Install OpenBLAS
        shell: pwsh
        run: |
          cd ${{ runner.workspace }}/vcpkg
          .\\vcpkg install openblas:x64-windows
        env:
          VCPKG_ROOT: ${{ runner.workspace }}/vcpkg

      # 6. Cache Cargo dependencies
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            screenpipe/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('screenpipe/**/Cargo.lock') }}

      # 7. Cache vcpkg installs
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.workspace }}/vcpkg/installed
            ${{ runner.workspace }}/vcpkg/downloads
            ${{ runner.workspace }}/vcpkg/buildtrees
          key: vcpkg-openblas-x64-windows-${{ hashFiles('screenpipe/Cargo.lock') }}
          restore-keys: |
            vcpkg-openblas-x64-windows-

      # 8. MSVC Developer Command Prompt (sets SDK + MSVC paths FIRST)
      - name: MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 9. Append vcpkg to MSVC environment (CRITICAL: preserves SDK paths)
      - name: Append vcpkg to MSVC env
        shell: pwsh
        run: |
          $vcpkgRoot = "${{ runner.workspace }}/vcpkg/installed/x64-windows"
          $vcpkgInclude = "$vcpkgRoot/include"
          $vcpkgLib = "$vcpkgRoot/lib"
          
          # Read current MSVC/SDK paths (set by msvc-dev-cmd)
          $include = [Environment]::GetEnvironmentVariable("INCLUDE", "Process")
          $lib = [Environment]::GetEnvironmentVariable("LIB", "Process")
          
          # Append vcpkg paths FIRST (headers/libs found in order)
          $newInclude = "$vcpkgInclude;$include"
          $newLib = "$vcpkgLib;$lib"
          
          echo "INCLUDE=$newInclude" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LIB=$newLib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "VCPKG_ROOT=${{ runner.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          # Debug output
          Write-Output "::debug::Final INCLUDE preview: $newInclude"
          Write-Output "::debug::Final LIB preview: $newLib"

      # 10. Debug environment (confirms kernel32.lib + cblas.h available)
      - name: Debug environment
        shell: cmd
        run: |
          echo LIB=%%LIB%%
          echo INCLUDE=%%INCLUDE%%
          where cl.exe
          where link.exe
          dir "%LIB:\kernel32.lib=%\kernel32.lib" 2>nul && echo kernel32.lib: FOUND || echo kernel32.lib: MISSING
          dir "%INCLUDE:\cblas.h=%\cblas.h" 2>nul && echo cblas.h: FOUND || echo cblas.h: MISSING

      # 11. Build screenpipe (vcpkg auto-discovered via VCPKGRS_DYNAMIC)
      - name: Build screenpipe for Windows
        run: |
          cd screenpipe
          cargo build --release
        env:
          VCPKG_ROOT: ${{ runner.workspace }}/vcpkg

      # 12. Upload built Windows binary
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-windows
          path: screenpipe/target/release/screenpipe.exe
