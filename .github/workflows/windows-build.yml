name: Build Windows screenpipe Binary

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout your workflow repo
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      # 2. Clone the screenpipe repo
      - name: Clone screenpipe repo
        run: git clone https://github.com/mediar-ai/screenpipe.git

      # 3. Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 4. Install vcpkg manually (simpler, avoids lukka issues)
      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/Microsoft/vcpkg.git ${{ runner.workspace }}/vcpkg
          cd ${{ runner.workspace }}/vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg integrate install

      # 5. Install OpenBLAS via vcpkg
      - name: Install OpenBLAS
        shell: pwsh
        run: |
          cd ${{ runner.workspace }}/vcpkg
          .\vcpkg install openblas:x64-windows
        env:
          VCPKG_ROOT: ${{ runner.workspace }}/vcpkg

      # 6. Cache Cargo dependencies
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            screenpipe/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('screenpipe/**/Cargo.lock') }}

      # 7. Cache vcpkg installs
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.workspace }}/vcpkg/installed
            ${{ runner.workspace }}/vcpkg/downloads
            ${{ runner.workspace }}/vcpkg/buildtrees
          key: vcpkg-openblas-x64-windows-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-openblas-x64-windows-

      # 8. MSVC Developer Command Prompt
      - name: MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # 9. Set vcpkg environment variables
      - name: Set vcpkg env vars
        shell: pwsh
        run: |
          $vcpkgRoot = "${{ runner.workspace }}/vcpkg"
          echo "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "INCLUDE=$($vcpkgRoot)/installed/x64-windows/include;%INCLUDE%" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LIB=$($vcpkgRoot)/installed/x64-windows/lib;%LIB%" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "OPENBLAS_DIR=$($vcpkgRoot)/installed/x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # 10. Build screenpipe
      - name: Build screenpipe for Windows
        run: |
          cd screenpipe
          cargo build --release
        env:
          VCPKG_ROOT: ${{ runner.workspace }}/vcpkg
          RUSTFLAGS: "-C link-arg=/LIBPATH:${{ runner.workspace }}/vcpkg/installed/x64-windows/lib"

      # 11. Upload built Windows binary
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-windows
          path: screenpipe/target/release/screenpipe.exe
