name: Build Windows screenpipe Binary

on:
  workflow_dispatch:       # manual trigger
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v3

      - name: Clone screenpipe repo
        run: git clone https://github.com/screenpipe/screenpipe.git

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup MSVC environment
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64

      - name: Build screenpipe
        run: |
          cd screenpipe
          cargo build

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-windows
          path: screenpipe/target/debug/screenpipe.exe