name: Build Windows screenpipe Binary

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Clone screenpipe repo
        run: git clone https://github.com/mediar-ai/screenpipe.git

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/Microsoft/vcpkg.git ${{ runner.workspace }}/vcpkg
          cd ${{ runner.workspace }}/vcpkg
          .\\bootstrap-vcpkg.bat

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            screenpipe/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('screenpipe/**/Cargo.lock') }}

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.workspace }}/vcpkg/installed
            ${{ runner.workspace }}/vcpkg/downloads
            ${{ runner.workspace }}/vcpkg/buildtrees
          key: vcpkg-openblas-x64-windows-v2

      - name: Install OpenBLAS
        shell: pwsh
        run: |
          cd ${{ runner.workspace }}/vcpkg
          .\\vcpkg install openblas:x64-windows --recurse
        env:
          VCPKG_ROOT: ${{ runner.workspace }}/vcpkg

      # FIXED: Manual MSVC + vcpkg setup
      - name: Setup MSVC Developer Command Prompt
        shell: cmd
        run: |
          set "VCARS="
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" set "VCARS=C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat"
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvarsall.bat" set "VCARS=C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvarsall.bat"
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvarsall.bat" set "VCARS=C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvarsall.bat"
          if exist "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" set "VCARS=C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat"
          if "%VCARS%"=="" (echo vcvarsall.bat not found && exit 1)
          call "%VCARS%" x64
          if "%LIB%"=="" (echo MSVC LIB not set && exit 1)
          if "%INCLUDE%"=="" (echo MSVC INCLUDE not set && exit 1)
          echo LIB=%LIB% >> %GITHUB_ENV%
          echo INCLUDE=%INCLUDE% >> %GITHUB_ENV%

      - name: Append vcpkg OpenBLAS paths
        shell: cmd
        run: |
          set "VCPKG_ROOT=${{ runner.workspace }}\vcpkg"
          set "VCPKG_INCLUDE=%VCPKG_ROOT%\installed\x64-windows\include"
          set "VCPKG_OPENBLAS_INCLUDE=%VCPKG_INCLUDE%\openblas"
          set "VCPKG_LIB=%VCPKG_ROOT%\installed\x64-windows\lib"
          
          REM Verify vcpkg files exist (header may be in include\ or include\openblas\)
          if exist "%VCPKG_INCLUDE%\cblas.h" (
            set "CBLAS_INCLUDE=%VCPKG_INCLUDE%"
          ) else (
            if exist "%VCPKG_OPENBLAS_INCLUDE%\cblas.h" (
              set "CBLAS_INCLUDE=%VCPKG_OPENBLAS_INCLUDE%"
            ) else (
              echo cblas.h missing && exit 1
            )
          )
          if not exist "%VCPKG_LIB%\openblas.lib" (echo openblas.lib missing && exit 1)
          
          REM Append to existing MSVC paths
          set "OLD_INCLUDE=%INCLUDE%"
          set "OLD_LIB=%LIB%"
          set "INCLUDE=%VCPKG_INCLUDE%;%CBLAS_INCLUDE%;%OLD_INCLUDE%"
          set "LIB=%VCPKG_LIB%;%OLD_LIB%"
          
          echo INCLUDE=%INCLUDE% >> %GITHUB_ENV%
          echo LIB=%LIB% >> %GITHUB_ENV%
          echo CBLAS_INCLUDE=%CBLAS_INCLUDE% >> %GITHUB_ENV%
          echo VCPKG_ROOT=%VCPKG_ROOT% >> %GITHUB_ENV%

      - name: Debug final environment
        shell: cmd
        run: |
          echo LIB=%LIB%
          echo INCLUDE=%INCLUDE%
          echo CBLAS_INCLUDE=%CBLAS_INCLUDE%
          echo.
          set "CBLAS1=%VCPKG_ROOT%\installed\x64-windows\include\cblas.h"
          set "CBLAS2=%VCPKG_ROOT%\installed\x64-windows\include\openblas\cblas.h"
          if exist "%CBLAS1%" (
            echo cblas.h: OK at %CBLAS1%
          ) else (
            if exist "%CBLAS2%" (
              echo cblas.h: OK at %CBLAS2%
            ) else (
              echo cblas.h: NOT FOUND IN EXPECTED PATHS
              dir "%VCPKG_ROOT%\installed\x64-windows\include"
              dir "%VCPKG_ROOT%\installed\x64-windows\include\openblas"
            )
          )
          if exist "%VCPKG_ROOT%\installed\x64-windows\lib\openblas.lib" (echo openblas.lib: OK) else (echo openblas.lib: NOT FOUND)

      - name: Build screenpipe
        shell: cmd
        run: |
          cd screenpipe
          cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-windows.exe
          path: screenpipe/target/release/screenpipe.exe
