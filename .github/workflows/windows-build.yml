name: Build Windows screenpipe Binary

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v3

      - name: Clone screenpipe repo
        run: git clone https://github.com/screenpipe/screenpipe.git

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Add Windows GNU Rust target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install MinGW-w64
        shell: cmd
        run: |
          choco install mingw -y
          refreshenv

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            screenpipe/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build screenpipe for Windows GNU
        shell: cmd
        run: |
          cd screenpipe
          cargo build --target x86_64-pc-windows-gnu

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-windows
          path: screenpipe/target/x86_64-pc-windows-gnu/debug/screenpipe.exe