name: Build Windows screenpipe Binary

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout your workflow repo
      - name: Checkout workflow repo
        uses: actions/checkout@v3

      # 2. Clone the screenpipe repo
      - name: Clone screenpipe repo
        run: git clone https://github.com/screenpipe/screenpipe.git

      # 3. Install Rust
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      # 4. Cache Cargo dependencies
      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            screenpipe/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # 5. Build screenpipe (MSVC target by default)
      - name: Build screenpipe for Windows
        run: |
          cd screenpipe
          cargo build

      # 6. Upload built Windows binary
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-windows
          path: screenpipe/target/debug/screenpipe.exe